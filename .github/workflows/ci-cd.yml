name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chatflow
          POSTGRES_PASSWORD: chatflow
          POSTGRES_DB: chatflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://chatflow:chatflow@localhost:5432/chatflow?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-key-minimum-32-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-key-minimum-32-chars
        run: npx prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://chatflow:chatflow@localhost:5432/chatflow?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-key-minimum-32-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-key-minimum-32-chars
        run: npm test

      - name: Build backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://chatflow:chatflow@localhost:5432/chatflow?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-key-minimum-32-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-key-minimum-32-chars
        run: npm run build

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t chatflow-backend ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:4000/api \
            --build-arg NEXT_PUBLIC_SOCKET_URL=http://localhost:4000 \
            -t chatflow-frontend ./frontend
