services:
  postgres:
    image: postgres:16-alpine
    container_name: chatflow-postgres
    environment:
      POSTGRES_USER: chatflow
      POSTGRES_PASSWORD: chatflow
      POSTGRES_DB: chatflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatflow -d chatflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatflow-backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      API_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://chatflow:chatflow@postgres:5432/chatflow?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-chatflow-docker-access-secret-key-32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-chatflow-docker-refresh-secret-key-32chars}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    container_name: chatflow-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
